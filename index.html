  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Puzzle Gambar Level</title>

<style>
body {
    font-family: Cooper Black;
    text-align: center;
    background: linear-gradient(to right, hsl(208, 87%, 12%), #844ba7);
    color: white;
}

h1 { margin-top: 30px; }

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    margin-top: 20px;
}

#game {
    display: grid;
    gap: 3px;
    width: 300px;
    height: 300px;
}

.tile {
    background-size: 300px 300px;
    cursor: pointer;
}

.empty {
    background: #83cfff;
}

.preview img {
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 0 10px black;
}

/* 🔥 TOMBOL */
.controls {
    margin-top: 15px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #8b55ff;
    color: white;
    font-weight: bold;
    font-family: Cooper Black;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

/* 🔥 ANIMASI MENANG */
#winOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.5s;
}

#winOverlay.show {
    visibility: visible;
    opacity: 1;
}

.winBox {
    background: white;
    color: #333;
    padding: 30px 50px;
    border-radius: 15px;
    font-size: 28px;
    font-weight: bold;
    animation: zoom 0.5s ease;
    box-shadow: 0 0 20px #00ffcc;
}

@keyframes zoom {
    from {
        transform: scale(0.5);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>

</head>

<body>

<div id="winOverlay">
    <div class="winBox">🎉 Level Selesai!</div>
</div>

<h1>🧩 Puzzle Gambar</h1>
<h3 id="levelText">Level 1</h3>

<div class="wrapper">
    <div id="game"></div>

    <div class="preview">
        <h3>Gambar Asli</h3>
        <img id="preview" src="Puzzle1.png">
    </div>
</div>

<!-- 🔥 TOMBOL -->
<div class="controls">
    <button onclick="shuffleBoard()">ACAK</button>
    <button onclick="nextLevel()">NEXT</button>
</div>

<script>

let level = 1;
let gridSize;
let tiles = [];
let emptyIndex;

/* 🔊 SOUND */
let clickSound = new Audio("click.mp3");
let winSound = new Audio("click.mp3");
 

function getImage(level){
    if(level <= 1) return "Puzzle1.png";
    else if(level <= 2) return "Puzzle2.png";
    else if(level <= 3) return "Puzzle3.png";
    else if(level <= 4) return "Puzzle4.png";
    else if(level <= 5) return "Puzzle5.png";
    else if(level <= 6) return "Puzzle6.png";
    else if(level <= 7) return "Puzzle7.png";
    else if(level <= 8) return "Puzzle8.png";
    else if(level <= 9) return "Puzzle9.png";
    else if(level <= 10) return "Puzzle10.png";
    else return "Level4.png";
}

function getGridSize(level){
    if(level <= 2) return 2;
    else if(level <= 4) return 3;
    else if(level <= 8) return 4;
    else return 5;
}

function startLevel(){
    gridSize = getGridSize(level);
    document.getElementById("levelText").innerText = "Level " + level;

    let game = document.getElementById("game");
    game.innerHTML = "";
    game.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    tiles = [];
    for(let i=0; i<gridSize*gridSize; i++){
        tiles.push(i);
    }

    shuffle(tiles);
    emptyIndex = tiles.length - 1;

    document.getElementById("preview").src = getImage(level);

    render();
}

function render(){
    let game = document.getElementById("game");
    game.innerHTML = "";

    let image = getImage(level);

    tiles.forEach((num, index) => {
        let div = document.createElement("div");
        div.classList.add("tile");

        if(index === emptyIndex){
            div.classList.add("empty");
        } else {
            let x = (num % gridSize) * (300 / gridSize);
            let y = Math.floor(num / gridSize) * (300 / gridSize);

            div.style.backgroundImage = `url(${image})`;
            div.style.backgroundPosition = `-${x}px -${y}px`;
        }

        div.onclick = () => move(index);
        game.appendChild(div);
    });
}

function move(index){
    let validMoves = [
        emptyIndex - 1,
        emptyIndex + 1,
        emptyIndex - gridSize,
        emptyIndex + gridSize
    ];

    if(validMoves.includes(index)){
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        emptyIndex = index;

        /* 🔊 SOUND klik */
        clickSound.currentTime = 0;
        clickSound.play();

        render();
        checkWin();
    }
}

/* 🔥 BUTTON */
function shuffleBoard(){
    shuffle(tiles);
    emptyIndex = tiles.length - 1;
    render();
}

function resetGame(){
    startLevel();
}

function nextLevel(){
    level++;
    if(level > 10) level = 1;
    startLevel();
}

function checkWin(){
    let win = true;

    for(let i=0; i<tiles.length; i++){
        if(tiles[i] !== i){
            win = false;
            break;
        }
    }

    if(win){

        /* 🔊 SOUND menang */
        winSound.currentTime = 0;
        winSound.play();

        document.getElementById("winOverlay").classList.add("show");

        setTimeout(() => {
            document.getElementById("winOverlay").classList.remove("show");

            level++;

            if(level > 10){
                alert("Kamu menyelesaikan semua level!");
                level = 1;
            }

            startLevel();
        }, 1500);
    }
}

function shuffle(array){
    for(let i = array.length -1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

startLevel();

</script>

</body>
</html>
